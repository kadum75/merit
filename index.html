<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Merit | CV Builder</title>
    <meta name="description" content="Merit helps you write, structure and optimise CVs for every role. ATS-optimised CV builder. Create professional CVs and cover letters in minutes." />
    <meta name="robots" content="index, follow" />
    <meta name="googlebot" content="index, follow" />
    <meta name="keywords" content="Merit, CV builder, ATS-optimised CV, CV writer, resume builder, job application, cover letter" />
    <meta name="author" content="ZenStack" />
    <link rel="canonical" href="https://merit-cv.vercel.app" />

    <!-- High-Resolution Favicons -->
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">

    <!-- Open Graph / LinkedIn -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://merit-cv.vercel.app/">
    <meta property="og:title" content="Merit — ATS-Optimised CV Builder">
    <meta property="og:description" content="Create professional, ATS-optimised CVs. Free to use.">
    <meta property="og:image" content="/images/merit-og.png">
    <meta property="og:site_name" content="Merit" />
    <meta property="og:locale" content="en_GB" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Merit — ATS-Optimised CV Builder" />
    <meta name="twitter:description" content="Create professional, ATS-optimised CVs. Free to use." />
    <meta name="twitter:image" content="/images/merit-og.png" />

    <!-- JSON-LD Structured Data: SoftwareApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Merit",
      "url": "https://merit-cv.vercel.app",
      "description": "ATS-optimised CV builder. Create, structure and optimise professional CVs and cover letters.",
      "applicationCategory": "WebApplication",
      "operatingSystem": "Web",
      "offers": [
        {
          "@type": "Offer",
          "name": "Starter",
          "price": "0",
          "priceCurrency": "GBP",
          "description": "Basic CV building with professional formatting and ATS-optimised structure."
        },
        {
          "@type": "Offer",
          "name": "Pro",
          "price": "9.99",
          "priceCurrency": "GBP",
          "description": "Unlimited downloads, full job tailoring, and priority support."
        }
      ],
      "author": {
        "@type": "Organization",
        "name": "ZenStack",
        "url": "https://webpagemain-pink.vercel.app"
      }
    }
    </script>

    <!-- JSON-LD Structured Data: HowTo -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "HowTo",
      "name": "How to Create a Professional CV with Merit",
      "description": "Create an ATS-optimised professional CV in three simple steps.",
      "step": [
        {
          "@type": "HowToStep",
          "position": 1,
          "name": "Fill in your details",
          "text": "Enter your experience, skills and education in our simple guided form. Takes about 2 minutes."
        },
        {
          "@type": "HowToStep",
          "position": 2,
          "name": "Paste the job description",
          "text": "Add the role you are applying for and Merit helps format your CV to match the specific requirements."
        },
        {
          "@type": "HowToStep",
          "position": 3,
          "name": "Download your PDF",
          "text": "Get a polished, ATS-ready A4 PDF instantly. Ready to attach and send to any employer."
        }
      ]
    }
    </script>

    <!-- JSON-LD Structured Data: FAQ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Is Merit free?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes, Merit offers a free Starter plan with professional formatting and ATS-optimised structure. Upgrade to Pro (£9.99/mo) for unlimited downloads and full job tailoring."
          }
        },
        {
          "@type": "Question",
          "name": "What is ATS optimisation?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "ATS (Applicant Tracking System) optimisation means your CV is structured to pass automated screening systems used by major recruiters and employers."
          }
        }
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
